name: Che Swarm

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run-swarm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install anthropic
      
      - name: Middleburg Agent
        run: python agents/middleburg_agent.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          
      - name: Woodys Agent
        run: python agents/woodys_agent.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
